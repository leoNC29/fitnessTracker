<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="calculadora corporal"
      content="uma calculadora de taxas metabólicas, necessária para estimar o gasto energético do corpo."
    />
    <meta
      name="keywords"
      content="taxa metabolica basal, emagrecimento, ganho de musculo"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Fitness Tracker</title>
  </head>
  <body>
    <h1>Fitness Tracker</h1>
    <p>Calcule Seu TMB</p>
    <form id="tmbForm">
      <div>
        <fieldset>
          <legend>Calculadora</legend>
          <label for="idade">Idade:</label>
          <input type="number" id="idade" name="idade" /><br /><br
          <label for="peso">Peso:</label>
          <input type="number" id="peso" name="peso" /><br><br>
          <label for="altura">Altura:</label>
          <input type="number" id="altura" name="altura" /><br><br>
          <label for="sexo">Sexo:</label>
          <select id="sexo" name="sexo">
            <option value="masculino">Masculino</option>
            <option value="feminino">Feminino</option></select
          ><br /><br
          <label for="objetivo">Objetivo:</label>
          <select id="objetivo" name="objetivo">
            <option value="emagrecer">Emagrecer</option>
            <option value="manutenção">Manutenção</option>
            <option value="ganhar_peso">Ganho de Peso</option></select
          ><br /><br
          <label for="nivel_atividade">Nível de Atividade:</label>
          <select id="atividade" name="atividade">
            <option value="sedentario">Sedentário</option>
            <option value="levemente_ativo">Levemente Ativo</option>
            <option value="moderadamente_ativo">Moderadamente Ativo</option>
            <option value="muito_ativo">Muito Ativo</option></select
          ><br /><br>
          <button type="button" id="calcular" onclick="calculadora()">
            Calcular
          </button>
        </fieldset>
      </div>
    </form>
    <br /><br />
    <p id="resultado"></p>
    <p id="get"></p>
    <p id="imc"></p>
    <p id="objetivo_Peso"></p>
    <p id="hidratação"></p>
    <script src="script.js"></script>
  </body>
</html>
